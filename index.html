<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinus und Kosinus am Einheitskreis</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #2c3e50;
            --sin-color: #2ecc71;
            --cos-color: #3498db;
            --gray-light: #e0e0e0;
            --gray-dark: #7f8c8d;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --primary-color: #2c3e50;
            --danger-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--bg-color);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-color);
        }

        .simulation-row {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .canvas-section {
            transition: opacity 0.3s ease, max-height 0.3s ease;
            max-height: 320px;
            overflow: hidden;
        }

        .canvas-section.hidden {
            opacity: 0;
            max-height: 0;
            margin: 0;
            padding: 0;
            pointer-events: none;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 240px;
            display: flex;
            justify-content: center;
        }

        canvas {
            display: block;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #f1f2f6;
            padding: 20px;
            border-radius: 15px;
        }

        .slider-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: opacity 0.3s ease, max-height 0.3s ease, margin 0.3s ease;
            max-height: 50px;
            opacity: 1;
        }

        .slider-wrapper.hidden {
            opacity: 0;
            max-height: 0;
            margin: 0;
            padding: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .slider-label {
            font-size: 1.1rem;
            font-weight: 500;
            min-width: 130px;
            font-feature-settings: "tnum";
        }

        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: var(--gray-light);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--text-color);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }

        .bottom-controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
            padding-top: 15px;
            border-top: 1px solid var(--gray-light);
        }

        .checkbox-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            flex: 1;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .btn-play {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            background-color: #27ae60;
            box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2);
            transition: all 0.2s ease;
            min-width: 160px;
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(39, 174, 96, 0.3);
        }

        .btn-play:active {
            transform: translateY(0);
        }

        .btn-play.playing {
            background-color: var(--danger-color);
            box-shadow: 0 4px 6px rgba(231, 76, 60, 0.2);
        }

        .btn-play.playing:hover {
            box-shadow: 0 6px 12px rgba(231, 76, 60, 0.3);
        }

        .function-label {
            font-size: 1.1rem;
            text-align: right;
            padding-right: 6%;
            margin-top: -25px;
            font-weight: bold;
            position: relative;
            z-index: 10;
        }
        
        .sin-text { color: var(--sin-color); }
        .cos-text { color: var(--cos-color); }
    </style>
</head>
<body>

<div class="container">
    <h1>Sinus und Kosinus am Einheitskreis</h1>
    
    <div class="simulation-row">
        <div id="sinSection" class="canvas-section">
            <div class="canvas-container">
                <canvas id="sinCanvas" width="800" height="240"></canvas>
            </div>
            <div class="function-label sin-text">f(x) = sin(x)</div>
        </div>

        <div id="cosSection" class="canvas-section">
            <div class="canvas-container">
                <canvas id="cosCanvas" width="800" height="240"></canvas>
            </div>
            <div class="function-label cos-text">f(x) = cos(x)</div>
        </div>
    </div>

    <div class="controls">
        <div id="sliderWrapper" class="slider-wrapper">
            <span class="slider-label">Winkel &alpha;: <span id="angleValue">0</span>°</span>
            <input type="range" id="angleSlider" min="0" max="360" value="0" step="1">
        </div>
        
        <div class="bottom-controls-row">
            <div class="checkbox-wrapper">
                <label class="checkbox-label">
                    <input type="checkbox" id="showSinCheck" checked>
                    Sinus anzeigen
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="showCosCheck" checked>
                    Kosinus anzeigen
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="connectPointsCheck">
                    Punkte verbinden
                </label>
            </div>
            
            <button id="playBtn" class="btn-play">
                <span id="btnIcon">▶</span> <span id="btnText">Abspielen</span>
            </button>
        </div>
    </div>
</div>

<script>
    const slider = document.getElementById('angleSlider');
    const angleValue = document.getElementById('angleValue');
    const sliderWrapper = document.getElementById('sliderWrapper');
    
    const showSinCheck = document.getElementById('showSinCheck');
    const showCosCheck = document.getElementById('showCosCheck');
    const connectPointsCheck = document.getElementById('connectPointsCheck');
    
    const playBtn = document.getElementById('playBtn');
    const btnIcon = document.getElementById('btnIcon');
    const btnText = document.getElementById('btnText');
    
    const sinSection = document.getElementById('sinSection');
    const cosSection = document.getElementById('cosSection');
    
    const sinCanvas = document.getElementById('sinCanvas');
    const cosCanvas = document.getElementById('cosCanvas');
    
    const ctxSin = sinCanvas.getContext('2d');
    const ctxCos = cosCanvas.getContext('2d');

    const cx = 120;       
    const cy = 110;       
    const r = 70;         
    const graphStartX = 260; 
    const graphWidth = 500;  

    let currentAngle = 0;
    let isPlaying = false;
    let animationId = null;
    const speed = 1.5; 

    function drawSimulation(angleDeg) {
        const angleRad = (angleDeg * Math.PI) / 180;
        
        const px = cx + r * Math.cos(angleRad);
        const py = cy - r * Math.sin(angleRad);

        if (showSinCheck.checked) {
            sinSection.classList.remove('hidden');
            drawSinCanvas(angleDeg, angleRad, px, py);
        } else {
            sinSection.classList.add('hidden');
        }

        if (showCosCheck.checked) {
            cosSection.classList.remove('hidden');
            drawCosCanvas(angleDeg, angleRad, px, py);
        } else {
            cosSection.classList.add('hidden');
        }
    }

    function getXTranslation(angleDeg) {
        if (angleDeg > 360) {
            return ((angleDeg - 360) / 360) * graphWidth;
        }
        return 0;
    }

    function drawSinCanvas(angleDeg, angleRad, px, py) {
        ctxSin.clearRect(0, 0, sinCanvas.width, sinCanvas.height);
        
        drawBaseCircle(ctxSin, angleDeg, px, py);
        
        ctxSin.beginPath();
        ctxSin.strokeStyle = '#2ecc71';
        ctxSin.lineWidth = 3;
        ctxSin.moveTo(px, cy);
        ctxSin.lineTo(px, py);
        ctxSin.stroke();

        const offsetX = getXTranslation(angleDeg);
        drawGraphAxes(ctxSin, offsetX, angleDeg);

        ctxSin.save();
        ctxSin.beginPath();
        ctxSin.rect(graphStartX, 0, graphWidth + 40, sinCanvas.height);
        ctxSin.clip();

        // Hilfslinien werden standardmäßig gezeichnet
        for (let i = 0; i <= angleDeg; i += 10) {
            const rad = (i * Math.PI) / 180;
            const x = graphStartX + (i / 360) * graphWidth - offsetX;
            const y = cy - r * Math.sin(rad);
            
            if (x >= graphStartX) {
                ctxSin.beginPath();
                if (i >= angleDeg - 5 && angleDeg > 0) { 
                    ctxSin.strokeStyle = '#2ecc71';
                    ctxSin.lineWidth = 3;
                } else {
                    ctxSin.strokeStyle = '#e0e0e0';
                    ctxSin.lineWidth = 1.5;
                }
                ctxSin.moveTo(x, cy);
                ctxSin.lineTo(x, y);
                ctxSin.stroke();
            }
        }

        if (connectPointsCheck.checked) {
            ctxSin.beginPath();
            ctxSin.strokeStyle = 'rgba(46, 204, 113, 0.6)';
            ctxSin.lineWidth = 2.5;
            let firstPoint = true;
            for (let i = 0; i <= angleDeg; i++) {
                const rad = (i * Math.PI) / 180;
                const x = graphStartX + (i / 360) * graphWidth - offsetX;
                const y = cy - r * Math.sin(rad);
                
                if (x >= graphStartX) {
                    if (firstPoint) {
                        ctxSin.moveTo(x, y);
                        firstPoint = false;
                    } else {
                        ctxSin.lineTo(x, y);
                    }
                }
            }
            ctxSin.stroke();
        }

        ctxSin.restore();

        const currentX = graphStartX + (angleDeg / 360) * graphWidth - offsetX;
        if (currentX >= graphStartX) {
            ctxSin.beginPath();
            ctxSin.strokeStyle = '#bdc3c7';
            ctxSin.lineWidth = 1;
            ctxSin.setLineDash([4, 4]);
            ctxSin.moveTo(px, py);
            ctxSin.lineTo(currentX, cy - r * Math.sin(angleRad));
            ctxSin.stroke();
            ctxSin.setLineDash([]); 
        }
    }

    function drawCosCanvas(angleDeg, angleRad, px, py) {
        ctxCos.clearRect(0, 0, cosCanvas.width, cosCanvas.height);
        
        drawBaseCircle(ctxCos, angleDeg, px, py);
        
        ctxCos.beginPath();
        ctxCos.strokeStyle = '#3498db';
        ctxCos.lineWidth = 3;
        ctxCos.moveTo(cx, cy);
        ctxCos.lineTo(px, cy);
        ctxCos.stroke();

        const offsetX = getXTranslation(angleDeg);
        drawGraphAxes(ctxCos, offsetX, angleDeg);

        ctxCos.save();
        ctxCos.beginPath();
        ctxCos.rect(graphStartX, 0, graphWidth + 40, cosCanvas.height);
        ctxCos.clip();

        // Hilfslinien werden standardmäßig gezeichnet
        for (let i = 0; i <= angleDeg; i += 10) {
            const rad = (i * Math.PI) / 180;
            const x = graphStartX + (i / 360) * graphWidth - offsetX;
            const y = cy - r * Math.cos(rad);
            
            if (x >= graphStartX) {
                ctxCos.beginPath();
                if (i >= angleDeg - 5 && angleDeg > 0) {
                    ctxCos.strokeStyle = '#3498db';
                    ctxCos.lineWidth = 3;
                } else {
                    ctxCos.strokeStyle = '#e0e0e0';
                    ctxCos.lineWidth = 1.5;
                }
                ctxCos.moveTo(x, cy);
                ctxCos.lineTo(x, y);
                ctxCos.stroke();
            }
        }

        if (connectPointsCheck.checked) {
            ctxCos.beginPath();
            ctxCos.strokeStyle = 'rgba(52, 152, 219, 0.6)';
            ctxCos.lineWidth = 2.5;
            let firstPoint = true;
            for (let i = 0; i <= angleDeg; i++) {
                const rad = (i * Math.PI) / 180;
                const x = graphStartX + (i / 360) * graphWidth - offsetX;
                const y = cy - r * Math.cos(rad);
                
                if (x >= graphStartX) {
                    if (firstPoint) {
                        ctxCos.moveTo(x, y);
                        firstPoint = false;
                    } else {
                        ctxCos.lineTo(x, y);
                    }
                }
            }
            ctxCos.stroke();
        }

        ctxCos.restore();

        ctxCos.beginPath();
        ctxCos.strokeStyle = '#bdc3c7';
        ctxCos.lineWidth = 1.5;
        ctxCos.setLineDash([4, 4]);
        ctxCos.moveTo(px, py);
        ctxCos.lineTo(px, cy);
        ctxCos.stroke();
        ctxCos.setLineDash([]);
    }

    function drawBaseCircle(ctx, angleDeg, px, py) {
        const visualAngleDeg = angleDeg % 360;

        ctx.beginPath();
        ctx.strokeStyle = '#7f8c8d';
        ctx.lineWidth = 1;
        ctx.moveTo(cx - r - 20, cy);
        ctx.lineTo(cx + r + 20, cy);
        ctx.moveTo(cx, cy - r - 20);
        ctx.lineTo(cx, cy + r + 20);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, 2 * Math.PI);
        ctx.strokeStyle = '#2c3e50';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = '#2c3e50';
        ctx.lineWidth = 2.5;
        ctx.moveTo(cx, cy);
        ctx.lineTo(px, py);
        ctx.stroke();

        if (visualAngleDeg > 0) {
            ctx.beginPath();
            ctx.arc(cx, cy, 20, 0, - (visualAngleDeg * Math.PI) / 180, true);
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(px, py, 5, 0, 2 * Math.PI);
        ctx.fillStyle = '#e74c3c'; 
        ctx.fill();

        ctx.fillStyle = '#7f8c8d';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText(`α = ${Math.floor(angleDeg)}°`, cx - 45, cy - r - 25);
    }

    function drawGraphAxes(ctx, offsetX, totalAngleDeg) {
        ctx.beginPath();
        ctx.strokeStyle = '#2c3e50';
        ctx.lineWidth = 2;
        ctx.moveTo(graphStartX, cy);
        ctx.lineTo(graphStartX + graphWidth + 20, cy);
        ctx.moveTo(graphStartX, cy - r - 20);
        ctx.lineTo(graphStartX, cy + r + 20);
        ctx.stroke();

        ctx.fillStyle = '#7f8c8d';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';

        ctx.beginPath();
        ctx.moveTo(graphStartX - 4, cy - r);
        ctx.lineTo(graphStartX + 4, cy - r);
        ctx.stroke();
        ctx.fillText('1', graphStartX - 8, cy - r);

        ctx.beginPath();
        ctx.moveTo(graphStartX - 4, cy + r);
        ctx.lineTo(graphStartX + 4, cy + r);
        ctx.stroke();
        ctx.fillText('-1', graphStartX - 8, cy + r);

        ctx.save();
        ctx.beginPath();
        ctx.rect(graphStartX, cy - 5, graphWidth + 40, 60);
        ctx.clip();

        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';

        const startLoopAngle = Math.floor(offsetX / (graphWidth / 360));
        const endLoopAngle = startLoopAngle + 405;

        for (let angle = 0; angle <= endLoopAngle; angle += 45) {
            if (angle % 45 !== 0) continue; 
            
            const x = graphStartX + (angle / 360) * graphWidth - offsetX;
            
            if (x >= graphStartX) {
                ctx.beginPath();
                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 1.5;
                ctx.moveTo(x, cy - 4);
                ctx.lineTo(x, cy + 4);
                ctx.stroke();

                ctx.font = '12px sans-serif';
                ctx.fillStyle = '#7f8c8d';
                ctx.fillText(`${angle}°`, x, cy + 8);

                if (angle > 0 && angle % 90 === 0) {
                    ctx.font = '11px sans-serif';
                    let label = '';
                    const piFraction = angle / 180;
                    
                    if (piFraction === 0.5) label = 'π/2';
                    else if (piFraction === 1) label = 'π';
                    else if (piFraction === 1.5) label = '3π/2';
                    else if (piFraction % 1 === 0) label = `${piFraction}π`;
                    else {
                        label = `${piFraction * 2}π/2`;
                    }

                    ctx.fillText(label, x, cy + 24);
                }
            }
        }
        ctx.restore();
    }

    function tick() {
        if (!isPlaying) return;
        
        currentAngle += speed;
        
        slider.value = Math.floor(currentAngle % 360);
        angleValue.textContent = Math.floor(currentAngle);
        
        drawSimulation(currentAngle);
        animationId = requestAnimationFrame(tick);
    }

    function togglePlayback() {
        isPlaying = !isPlaying;
        
        if (isPlaying) {
            playBtn.classList.add('playing');
            btnIcon.textContent = '❚❚';
            btnText.textContent = 'Anhalten';
            sliderWrapper.classList.add('hidden');
            
            if (currentAngle % 360 !== parseInt(slider.value)) {
                currentAngle = parseInt(slider.value);
            }
            tick();
        } else {
            playBtn.classList.remove('playing');
            btnIcon.textContent = '▶';
            btnText.textContent = 'Abspielen';
            sliderWrapper.classList.remove('hidden');
            
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            currentAngle = parseInt(slider.value);
            angleValue.textContent = currentAngle;
            drawSimulation(currentAngle);
        }
    }

    function handleManualInput() {
        if (!isPlaying) {
            currentAngle = parseInt(slider.value);
            angleValue.textContent = currentAngle;
            drawSimulation(currentAngle);
        }
    }

    slider.addEventListener('input', handleManualInput);
    showSinCheck.addEventListener('change', () => drawSimulation(currentAngle));
    showCosCheck.addEventListener('change', () => drawSimulation(currentAngle));
    connectPointsCheck.addEventListener('change', () => drawSimulation(currentAngle));
    playBtn.addEventListener('click', togglePlayback);

    drawSimulation(currentAngle);
</script>

</body>
</html>
